<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.I.M Logo Generator</title>
    <style>
        body {
            background-color: #061322;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
        }
        .wrapper {
            background: #061322;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
        }
        .btn {
            margin-top: 25px;
            background: linear-gradient(135deg, #FFE259, #FFA751);
            color: #061322;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 226, 89, 0.4);
            transition: 0.3s;
        }
        .btn:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <!-- हाच तुमचा मुख्य प्रिमियम लोगो आहे -->
        <div id="logo-capture">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 140" width="660" height="140">
              <defs>
                <linearGradient id="metallicGold" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stop-color="#FFF3B0" />
                  <stop offset="30%" stop-color="#FFE259" />
                  <stop offset="70%" stop-color="#FFA751" />
                  <stop offset="100%" stop-color="#FF7300" />
                </linearGradient>
                <linearGradient id="silverWhite" x1="0%" y1="0%" x2="100%" y2="0%">
                  <stop offset="0%" stop-color="#FFFFFF" />
                  <stop offset="100%" stop-color="#E2E8F0" />
                </linearGradient>
                <filter id="premiumGlow" x="-30%" y="-30%" width="160%" height="160%">
                  <feGaussianBlur stdDeviation="3" result="blur" />
                  <feColorMatrix type="matrix" values="1 0 0 0 1  0 1 0 0 0.6  0 0 1 0 0  0 0 0 0.8 0" />
                  <feMerge>
                    <feMergeNode />
                    <feMergeNode in="SourceGraphic" />
                  </feMerge>
                </filter>
              </defs>
              
              <!-- Background block ensuring it exports correctly -->
              <rect width="100%" height="100%" fill="#061322"/>
              
              <g transform="translate(18, 10)">
                <polygon points="55,5 98,30 98,80 55,105 12,80 12,30" fill="none" stroke="url(#metallicGold)" stroke-width="2" opacity="0.4"/>
                <circle cx="55" cy="55" r="38" fill="none" stroke="url(#silverWhite)" stroke-width="1.5" stroke-dasharray="4,4" opacity="0.3"/>
                <path d="M 28,56 L 44,70 L 82,32" fill="none" stroke="url(#metallicGold)" stroke-width="7.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#premiumGlow)"/>
                <path d="M 38,66 L 48,77 L 85,38" fill="none" stroke="url(#silverWhite)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
                <rect x="18" y="92" width="74" height="20" rx="4" fill="url(#metallicGold)"/>
                <text x="55" y="107" font-family="'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="900" fill="#061322" text-anchor="middle" letter-spacing="1.5">S I M</text>
              </g>
              
              <text x="150" y="44" font-family="'Segoe UI', Roboto, sans-serif" font-size="36" font-weight="900" fill="url(#metallicGold)" letter-spacing="0.5">
                S<tspan fill="#FFFFFF" font-size="30" font-weight="700">HREE </tspan>I<tspan fill="#FFFFFF" font-size="30" font-weight="700">NSTITUTE</tspan>
              </text>
              
              <text x="150" y="75" font-family="'Segoe UI', Roboto, sans-serif" font-size="16" font-weight="800" fill="#E2E8F0" letter-spacing="1.2">
                MANDANGAD <tspan fill="url(#metallicGold)" font-size="17" font-weight="900">(S.I.M.)</tspan>
              </text>
              
              <text x="150" y="106" font-family="'Segoe UI', Roboto, sans-serif" font-size="14.5" font-weight="700" fill="#FFE259" letter-spacing="0.2" filter="url(#premiumGlow)">
                "Your Doubts, Our Mission... YES, I AM THERE!"
              </text>
            </svg>
        </div>
        
        <button class="btn" onclick="downloadSVGAsPNG()">📥 Download Logo Image (.png)</button>
    </div>

    <script>
        function downloadSVGAsPNG() {
            const svgElement = document.querySelector('svg');
            const svgString = new XMLSerializer().serializeToString(svgElement);
            const svgBlob = new Blob([svgString], { type: 'image/svg+xml;charset=utf-8' });
            const URL = window.URL || window.webkitURL || window;
            const blobURL = URL.createObjectURL(svgBlob);
            
            const image = new Image();
            image.onload = () => {
                const canvas = document.createElement('canvas');
                canvas.width = 660;
                canvas.height = 140;
                const context = canvas.getContext('2d');
                context.drawImage(image, 0, 0);
                
                const png = canvas.toDataURL('image/png');
                const downloadLink = document.createElement('a');
                downloadLink.href = png;
                downloadLink.download = 'Shree_Institute_SIM_Logo.png';
                document.body.appendChild(downloadLink);
                downloadLink.click();
                document.body.removeChild(downloadLink);
            };
            image.src = blobURL;
        }
    </script>
</body>
</html>
